# --- الشاشة والعرض ---
monitor=,preferred,auto,1

# --- التشغيل التلقائي ---
# ملاحظة: swww-daemon و waybar سيعملان تلقائياً عبر نظام Systemd الذي ضبطناه في ملف الـ Nix
exec-once = hyprpaper
exec-once = waybar
exec-once = swww-daemon
exec-once = nm-applet --indicator
exec-once = copyq --start-server
exec-once = hyprctl setcursor breeze_cursors 24

# --- المتغيرات الأساسية ---
$mainMod = SUPER

# --- الكيبورد واللغات ---
input {
    kb_layout = us,ara
    kb_options = grp:win_space_toggle # التبديل بين العربي والإنجليزي بـ Super + Space
}

# --- المظهر الجمالي (النمط الزجاجي) ---
general {
    gaps_in = 0               # مسافات بين النوافذ
    gaps_out = 5             # مسافات بين النافذة وطرف الشاشة
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}
decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 5
        passes = 2
    }

    # التعديل الجديد هنا
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# --- الاختصارات (Keybindings) ---
bind = $mainMod, Q, exec, kitty
bind = $mainMod, X, killactive,        # غيرنا اختصار الإغلاق لـ X لأن C محجوز للآلة الحاسبة
bind = $mainMod, M, exit, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, E, exec, nautilus
bind = $mainMod, 1, exec, firefox      # متصفح قوقل
bind = $mainMod, V, exec, copyq show
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy


# آلة حاسبة وتاسك مانجر
bind = $mainMod, C, exec, kcalc
bind = $mainMod, Escape, exec, kitty --class taskmanager -e btop

# تصوير الشاشة
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# --- التنقل والتحكم بالنوافذ ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

binde = $mainMod CTRL, left, resizeactive, -20 0
binde = $mainMod CTRL, right, resizeactive, 20 0
binde = $mainMod CTRL, up, resizeactive, 0 -20
binde = $mainMod CTRL, down, resizeactive, 0 20

# --- التحكم بالصوت ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- قواعد النوافذ (Window Rules) ---
windowrulev2 = float, class:^(taskmanager)$
windowrulev2 = size 800 600, class:^(taskmanager)$
windowrulev2 = center, class:^(taskmanager)$
windowrulev2 = opacity 0.92 0.85, class:^(kitty)$

# قاعدة لجعل نافذة الكليب بورد تظهر بشكل طائر في المنتصف
windowrulev2 = float, class:^(com.github.hluk.copyq)$
windowrulev2 = size 800 500, class:^(com.github.hluk.copyq)$
windowrulev2 = center, class:^(com.github.hluk.copyq)$


cursor {
    no_hardware_cursors = false
}
