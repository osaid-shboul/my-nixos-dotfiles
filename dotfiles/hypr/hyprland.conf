# ============================================================================
# 1. الشاشة والعرض (Monitors)
# ============================================================================
monitor=,preferred,auto,1

# ============================================================================
# 2. التشغيل التلقائي (Autostart)
# ============================================================================
exec-once = waybar
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = copyq --start-server
exec-once = hyprctl setcursor breeze_cursors 24
exec-once = blueman-applet
exec-once = kitty --class cheatsheet -e bash -c "clear; cat ~/nixos-config/shortcuts.txt; read -n 1 -t 10"

# ============================================================================
# 3. المتغيرات والمدخلات (Variables & Input)
# ============================================================================
$mainMod = SUPER

input {
    kb_layout = us,ara
    kb_options = grp:win_space_toggle # التبديل بـ Super + Space
}

# ============================================================================
# 4. المظهر الجمالي (UI & Eye Candy)
# ============================================================================
general {
    gaps_in = 0
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 5
        passes = 2
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

cursor {
    no_hardware_cursors = false
}

# ============================================================================
# 5. قواعد النوافذ (Window Rules)
# ============================================================================
# الطرفية (الشفافية)
windowrulev2 = opacity 0.92 0.85, class:^(kitty)$

# إدارة المهام (Btop في المنتصف)
windowrulev2 = float, class:^(taskmanager)$
windowrulev2 = size 800 600, class:^(taskmanager)$
windowrulev2 = center, class:^(taskmanager)$

# الحافظة (CopyQ)
windowrulev2 = float, class:^(com.github.hluk.copyq)$
windowrulev2 = size 800 500, class:^(com.github.hluk.copyq)$
windowrulev2 = center, class:^(com.github.hluk.copyq)$

#شاشة الاختصارات
windowrulev2 = float, class:^(cheatsheet)$
windowrulev2 = size 500 350, class:^(cheatsheet)$
windowrulev2 = center, class:^(cheatsheet)$
windowrulev2 = animation slide, class:^(cheatsheet)$

# ============================================================================
# 6. الاختصارات (Keybindings)
# ============================================================================
# اختصارات النظام والبرامج
bind = $mainMod, Q, exec, kitty
bind = $mainMod, X, killactive,
bind = $mainMod, M, exit, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, E, exec, nautilus
bind = $mainMod, 1, exec, firefox
bind = $mainMod, V, exec, copyq show
bind = $mainMod, C, exec, kcalc
bind = $mainMod, Escape, exec, kitty --class taskmanager -e btop

# تصوير الشاشة
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# التنقل والتحكم بالنوافذ
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

binde = $mainMod CTRL, left, resizeactive, -20 0
binde = $mainMod CTRL, right, resizeactive, 20 0
binde = $mainMod CTRL, up, resizeactive, 0 -20
binde = $mainMod CTRL, down, resizeactive, 0 20

# أزرار الصوت (Volume Keys)
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# أزرار السطوع (Brightness Keys)
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
